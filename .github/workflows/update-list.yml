name: Auto-Update Legal Apps List

on:
  schedule:
    - cron: "0 9 * * 1"     # 09:00 UTC every Monday
  workflow_dispatch:          # Manual trigger for testing

permissions:
  contents: write             # Allows the built-in GITHUB_TOKEN to push commits

concurrency:
  group: auto-update-list     # Never run two updates at once
  cancel-in-progress: false

jobs:
  update-list:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # persist-credentials defaults to true, so the in-skill `git push`
          # authenticates with the built-in GITHUB_TOKEN — no PAT required.

      - name: Run sync-and-update skill
        uses: anthropics/claude-code-action@v1
        with:
          # Auth via a Claude Code subscription OAuth token (no per-run API billing).
          # Generate with `claude setup-token` and store as the CLAUDE_CODE_OAUTH_TOKEN secret.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: "/sync-and-update"
          claude_args: "--max-turns 40"

      - name: Commit and push fallback
        # Safety net: the skill commits and pushes itself, but if for any reason
        # it edited files without committing, this captures them. No-op when clean.
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: automated weekly update — new legal tech entries"
          file_pattern: "README.md CHANGELOG.md"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
